name: ketobuddy
description: "KetoBuddy - barcode scanner keto score app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  mobile_scanner: ^5.2.3
  dio: ^5.8.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  hive_flutter: ^1.1.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.3
  mocktail: ^1.0.4
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/config/keto_score_config.json
    - assets/images/appicon.png
  fonts:
    - family: DMSans
      fonts:
        - asset: assets/font/DMSans.ttf
